<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlooxView - Share your world!</title>
    
    <link rel="icon" type="image/x-icon" href="favico.ico">
    
    <style>
        body { font-family: Arial, sans-serif; background: #fff; margin: 0; padding: 0; }
        #header { background: #fff; border-bottom: 1px solid #2ecc71; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        
        #logo { height: 35px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: bold; color: #2ecc71; text-decoration: none; }
        #logo img { height: 35px; object-fit: contain; }

        .nav button { background: none; border: none; color: #2ecc71; font-weight: bold; cursor: pointer; margin-left: 15px; }
        .container { max-width: 1100px; margin: 20px auto; background: #fff; border: 1px solid #ccc; padding: 20px; min-height: 80vh; }
        .site-banner { padding: 10px; border: 1px dashed #2ecc71; margin-bottom: 20px; text-align: center; font-weight: bold; color: #333; }
        .page { display: none; }
        .page.active { display: block; }
        
        /* FIX: Adjusted height to ensure the control bar is visible */
        .video-wrapper { 
            width: 100%; 
            max-width: 1024px; 
            height: 580px; 
            background: #000; 
            border: 1px solid #2ecc71; 
            position: relative; 
            margin: 0 auto;
            overflow: hidden;
        }
        #custom-player-frame { width: 100%; height: 100%; border: none; display: block; }
        
        .video-details { width: 100%; max-width: 1024px; margin: 20px auto; }
        #video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .v-card { cursor: pointer; border: 1px solid #eee; padding: 5px; transition: 0.2s; }
        .v-card:hover { border-color: #2ecc71; }
        .v-card img { width: 100%; aspect-ratio: 16/9; background: #000; object-fit: cover; }
        .v-card .title { font-size: 13px; font-weight: bold; color: #2ecc71; margin-top: 5px; display: block; }
        
        .upload-form input, .upload-form textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn-post { padding: 10px 30px; background: #2ecc71; color: #fff; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>

        <div class="nav">
            <button onclick="nav('home')">Home</button>
            <button onclick="nav('upload')">Upload</button>
        </div>
    </div>

    <div class="container">
        <div class="site-banner">Share your world! Welcome to BlooxView!</div>

        <div id="home" class="page active">
            <h2 style="font-size: 16px; border-bottom: 1px solid #ccc; padding-bottom: 10px;">Featured Videos</h2>
            <div id="video-grid">Loading...</div>
        </div>

        <div id="watch" class="page">
            <button onclick="nav('home')" style="margin-bottom:10px; cursor: pointer;">« Back</button>
            <div class="video-wrapper">
                <iframe id="custom-player-frame" src="player.html" allowfullscreen></iframe>
            </div>
            <div class="video-details">
                <h1 id="v-title"></h1>
                <p id="v-desc"></p>
            </div>
        </div>

        <div id="upload" class="page">
            <h2>Upload Video</h2>
            <div class="upload-form">
                <input type="text" id="in-title" placeholder="Video Title">
                <input type="text" id="in-url" placeholder="Video URL (Catbox.moe Link)">
                <input type="text" id="in-thumb" placeholder="Thumbnail URL">
                <textarea id="in-desc" placeholder="Description" rows="5"></textarea>
                <button class="btn-post" id="btn-publish">Publish</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";
        
        const app = initializeApp({
            apiKey: "AIzaSyDCHSKOqDGNseVrvdFxndFx3VYAQF3nV48",
            authDomain: "yt2009-dbeb8.firebaseapp.com",
            databaseURL: "https://yt2009-dbeb8-default-rtdb.firebaseio.com",
            projectId: "yt2009-dbeb8"
        });
        const db = getDatabase(app);

        window.nav = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id !== 'watch') document.getElementById('custom-player-frame').src = "player.html";
        };

        onValue(ref(db, "videos"), snap => {
            const grid = document.getElementById("video-grid");
            grid.innerHTML = "";
            snap.forEach(child => {
                const v = child.val();
                const el = document.createElement("div");
                el.className = "v-card";
                el.innerHTML = `<img src="${v.thumbnail}"><span class="title">${v.title}</span>`;
                el.onclick = () => {
                    nav('watch');
                    document.getElementById('v-title').innerText = v.title;
                    document.getElementById('v-desc').innerText = v.description || "";
                    const frame = document.getElementById('custom-player-frame');
                    frame.src = `player.html?video=${encodeURIComponent(v.url)}`;
                };
                grid.appendChild(el);
            });
        });

        document.getElementById('btn-publish').onclick = () => {
            const title = document.getElementById('in-title').value;
            const url = document.getElementById('in-url').value;
            const thumb = document.getElementById('in-thumb').value;
            const desc = document.getElementById('in-desc').value;
            if(!title || !url) return alert("Title and URL are required!");
            push(ref(db, "videos"), { title, url, thumbnail: thumb, description: desc })
                .then(() => { alert("Published!"); nav('home'); });
        };
    </script>
