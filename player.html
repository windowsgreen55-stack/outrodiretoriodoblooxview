<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { 
            background-color: #000; 
            margin: 0; padding: 0; 
            height: 100%; width: 100%; 
            overflow: hidden; 
            font-family: Arial, sans-serif; 
        }
        
        .player-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* FIX: object-fit: contain prevents stretching! */
        video { 
            flex-grow: 1; 
            width: 100%; 
            height: calc(100% - 32px);
            background: #000; 
            object-fit: contain;
            cursor: pointer;
        }

        .flash-chrome {
            height: 32px;
            background: linear-gradient(to bottom, #e5e5e5 0%, #b0b0b0 50%, #9a9a9a 100%);
            border-top: 1px solid #fff;
            display: flex; align-items: center; padding: 0 5px; gap: 5px; box-sizing: border-box;
        }

        .f-btn { width: 28px; height: 22px; background: linear-gradient(to bottom, #fff, #ccc); border: 1px solid #777; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .icon-play { width: 0; height: 0; border-top: 5px solid transparent; border-bottom: 5px solid transparent; border-left: 8px solid #333; }
        .icon-pause { width: 8px; height: 10px; border-left: 3px solid #333; border-right: 3px solid #333; }

        .f-seekbar { flex-grow: 1; height: 12px; position: relative; cursor: pointer; display: flex; align-items: center; }
        .f-seekbar-bg { width: 100%; height: 8px; background: #3a3a3a; border: 1px solid #222; position: relative; }
        .f-progress-fill { height: 100%; width: 0%; background: #ff0000; box-shadow: inset 0 0 5px rgba(0,0,0,0.5); pointer-events: none; }
        
        .f-timer { background: #000; color: #fff; font-size: 10px; padding: 2px 5px; border: 1px solid #666; min-width: 85px; text-align: center; }
    </style>
</head>
<body>

    <div class="player-container">
        <video id="main-video"></video>

        <div class="flash-chrome">
            <div class="f-btn" id="play-btn"><div class="icon-play" id="play-icon"></div></div>
            
            <div class="f-seekbar" id="seekbar">
                <div class="f-seekbar-bg">
                    <div class="f-progress-fill" id="fill"></div>
                </div>
            </div>

            <div class="f-timer">
                <span id="curr">00:00</span> / <span style="color:#ff0000; font-weight:bold;" id="total">00:00</span>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('main-video');
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const fill = document.getElementById('fill');
        const seekbar = document.getElementById('seekbar');

        const urlParams = new URLSearchParams(window.location.search);
        const videoUrl = urlParams.get('video');
        if (videoUrl) video.src = videoUrl;

        function togglePlay() {
            if(video.paused) {
                video.play();
                playIcon.className = "icon-pause";
            } else {
                video.pause();
                playIcon.className = "icon-play";
            }
        }

        playBtn.onclick = togglePlay;
        video.onclick = togglePlay;

        video.ontimeupdate = () => {
            const pct = (video.currentTime / video.duration) * 100 || 0;
            fill.style.width = pct + "%";
            document.getElementById('curr').innerText = formatTime(video.currentTime);
        };

        video.onloadedmetadata = () => {
            document.getElementById('total').innerText = formatTime(video.duration);
        };

        seekbar.onclick = (e) => {
            const rect = seekbar.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            video.currentTime = pos * video.duration;
        };

        function formatTime(secs) {
            if (isNaN(secs)) return "00:00";
            let m = Math.floor(secs / 60);
            let s = Math.floor(secs % 60);
            return (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s);
        }
    </script>
</body>
</html>
